# Tomcat
server:
  port: 8080

# Spring
spring:
  application:
    # жҗҙж—Ӯж•ӨйҚҡе¶ҮРһ
    name: y-main
  profiles:
    # йҗңоҲҡо•Ёй–°е¶Үз–Ҷ
    active: ${SERVER_ENV:${SERVER_EVN:dev}}
  main:
    allow-bean-definition-overriding: true
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
