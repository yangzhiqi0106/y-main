#缓存
spring.cache.caffeine.spec=initialCapacity=10,maximumSize=200,expireAfterWrite=10m
spring.cache.type=caffeine
#编码格式
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8
#数据库连接配置
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
#spring.datasource.druid.master.name=uspdb
#spring.datasource.dynamic.primary=master
#spring.datasource.dynamic.strict=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=uspdb
spring.datasource.url=jdbc:mysql://192.168.3.100:3306/maindb?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
#spring.datasource.dynamic.datasource.slave.enabled=false
#连接池druid配置
# 初始连接数
spring.datasource.druid.initial-size=5
# 最小连接池数量
spring.datasource.druid.minIdle=10
# 最大连接池数量
spring.datasource.druid.maxActive=20
# 配置获取连接等待超时的时间
spring.datasource.druid.maxWait=60000
# 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
spring.datasource.druid.timeBetweenEvictionRunsMillis=60000
# 配置一个连接在池中最小生存的时间，单位是毫秒
spring.datasource.druid.minEvictableIdleTimeMillis=300000
# 配置一个连接在池中最大生存的时间，单位是毫秒
spring.datasource.druid.maxEvictableIdleTimeMillis=900000
# 配置检测连接是否有效
spring.datasource.druid.validationQuery=SELECT 1 FROM DUAL
spring.datasource.druid.testWhileIdle=true
spring.datasource.druid.testOnBorrow=false
spring.datasource.druid.testOnReturn=false
#spring.datasource.dynamic.druid.connection-properties=config.decrypt=true;config.decrypt.key=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQCcv2VySwXUHgKhNUgVv2cSioEscSbzncBulRAIp1gGkk6aBuOzBK/VwOjr/fJW/uDC44bBqoAJuPxa/s7pliSvrOqH38loJ7hrfTPjWoNuR9pmOsfigKR8/3D56AdKnvnR8tD28WJ1V1STc2OfiYaDCQagB7nWIsjkyy6zUqfVLwIDAQAB
spring.datasource.druid.web-stat-filter.enabled=false
spring.datasource.druid.stat-view-servlet.enabled=false
# 设置白名单，不填则允许所有访问
spring.datasource.druid.stat-view-servlet.allow=
spring.datasource.druid.stat-view-servlet.url-pattern=/druid/*
# 控制台管理用户名和密码
spring.datasource.druid.stat-view-servlet.login-username=
spring.datasource.druid.stat-view-servlet.login-password=
spring.datasource.druid.filter.stat.enabled=true
spring.datasource.druid.filter.config.enabled=true
# 慢SQL记录
spring.datasource.druid.filter.stat.log-slow-sql=true
spring.datasource.druid.filter.stat.slow-sql-millis=1000
spring.datasource.druid.filter.stat.merge-sql=true
spring.datasource.druid.filter.wall.config.multi-statement-allow=true
# mybatis-plus配置
# 搜索指定包别名
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
#mybatis-plus.configuration.log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
# seata配置
# 默认关闭，如需启用spring.datasource.dynami.seata需要同时开启
# seata.enabled=true
#缓存
logging.level.org.springframework.security:debug
logging.file.path=D:/log
logging.appName=y-main
logging.config:classpath:logback-set.xml
